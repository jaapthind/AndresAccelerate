<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndresAccelerate: Global City Fitness</title>
    <style>
        :root {
            --bg-dark: #0f0f15;
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.5);
            --danger: #ff3366;
            --ui-bg: rgba(10, 10, 15, 0.85);
        }
        * { box-sizing: border-box; user-select: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* --- MAIN MENU --- */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1a1a25 0%, #000 100%);
        }
        #main-menu h1 {
            font-size: 4rem; color: var(--accent); margin-bottom: 10px;
            text-shadow: 0 0 20px var(--accent-glow); text-transform: uppercase; letter-spacing: 5px;
        }
        #main-menu p { color: #888; font-size: 1.2rem; margin-bottom: 40px; }
        
        .city-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1000px;
        }
        .city-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 20px;
            border-radius: 8px; color: #fff; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; text-align: center;
            font-family: inherit;
        }
        .city-btn:hover {
            background: rgba(0, 255, 204, 0.2); border-color: var(--accent);
            transform: translateY(-5px); box-shadow: 0 5px 15px var(--accent-glow);
        }
        
        /* --- HUD --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: none; flex-direction: column;
            justify-content: space-between; padding: 20px;
        }
        .panel {
            background: var(--ui-bg); border: 1px solid #333; border-radius: 8px;
            padding: 15px 25px; backdrop-filter: blur(5px);
        }
        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-title { font-size: 24px; color: var(--accent); margin: 0 0 5px 0; text-transform: uppercase; }
        .location-text { color: #aaa; font-size: 14px; margin: 0; }
        
        .stats-grid { display: grid; grid-template-columns: auto auto; gap: 10px 25px; }
        .stat-label { color: #888; font-weight: bold; }
        .stat-value { font-size: 20px; text-align: right; }
        #weight-val { color: var(--danger); font-weight: bold; transition: color 0.3s; }
        #speed-val { color: #ffaa00; }
        #dist-val { color: #aaa; }

        #bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
        .controls-info { font-size: 12px; color: #666; line-height: 1.8; }
        .key { background: #222; border: 1px solid #555; padding: 2px 6px; border-radius: 3px; color: #ccc; }
        
        /* Loading Overlay */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none;
            justify-content: center; align-items: center; color: var(--accent); font-size: 2rem;
        }
        
        /* Progress Bar */
        #progress-container { width: 300px; text-align: right; }
        #progress-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .bar-bg { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        #fitness-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--danger), var(--accent)); transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>AndresAccelerate</h1>
        <p>Urban Fitness Simulator // Select Your City</p>
        <div class="city-grid" id="city-buttons"></div>
    </div>

    <div id="loader">GENERATING METROPOLIS...</div>

    <div id="hud">
        <div id="top-bar">
            <div class="panel">
                <h2 class="hud-title" id="hud-city-name">CITY</h2>
                <p class="location-text">Sector: <span id="hud-landmark">Downtown</span></p>
            </div>
            <div class="panel stats-grid">
                <div class="stat-label">BODY MASS:</div>
                <div class="stat-value"><span id="weight-val">350.0</span> LBS</div>
                <div class="stat-label">VELOCITY:</div>
                <div class="stat-value"><span id="speed-val">0.00</span> MPH</div>
                <div class="stat-label">DISTANCE:</div>
                <div class="stat-value"><span id="dist-val">0.0</span> MI</div>
            </div>
        </div>
        <div id="bottom-bar">
            <div class="panel controls-info">
                <span class="key">↑</span> Run Forward &nbsp;&nbsp; <span class="key">↓</span> Brake/Reverse<br>
                <span class="key">←</span> <span class="key">→</span> Steer Left/Right
            </div>
            <div id="progress-container">
                <div id="progress-label">FITNESS LEVEL</div>
                <div class="bar-bg"><div id="fitness-bar"></div></div>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * ==========================================
         * ANDRES ACCELERATE - CITY ENGINE CORE
         * ==========================================
         */

        // --- 1. CITY DATABASES ---
        const Cities = [
            { id: 0, name: "New York", sky: 0x87CEEB, fog: 0xa0c0d0, ground: 0x333333, buildBase: 0x555555, hasPark: true, landmark: "Empire State Building", type: "grid" },
            { id: 1, name: "Tokyo", sky: 0x0a0a2a, fog: 0x1a1a3a, ground: 0x111111, buildBase: 0x222233, hasPark: false, landmark: "Tokyo Tower", type: "dense", neon: true },
            { id: 2, name: "London", sky: 0x99aabb, fog: 0x8899aa, ground: 0x444444, buildBase: 0x6b5b4b, hasPark: true, landmark: "Big Ben", type: "radial" },
            { id: 3, name: "Paris", sky: 0xabcbdb, fog: 0x9aabba, ground: 0x55504a, buildBase: 0xddddcc, hasPark: true, landmark: "Eiffel Tower", type: "radial" },
            { id: 4, name: "San Francisco", sky: 0x4488ff, fog: 0xddddff, ground: 0x4a5a3a, buildBase: 0xeeeeee, hasPark: true, landmark: "Transamerica Pyramid", type: "hills" },
            { id: 5, name: "Dubai", sky: 0x22bbff, fog: 0xddbb99, ground: 0xddbb99, buildBase: 0xffffff, hasPark: false, landmark: "Burj Khalifa", type: "spread", glass: true },
            { id: 6, name: "Chicago", sky: 0x5577aa, fog: 0x6688bb, ground: 0x2a2a2a, buildBase: 0x333333, hasPark: true, landmark: "Willis Tower", type: "grid" },
            { id: 7, name: "Sydney", sky: 0x00aaff, fog: 0x88ccff, ground: 0x335533, buildBase: 0xdddddd, hasPark: true, landmark: "Opera House", type: "coastal" },
            { id: 8, name: "Rome", sky: 0x55aaff, fog: 0xaaccff, ground: 0x665544, buildBase: 0xddaa88, hasPark: false, landmark: "Colosseum", type: "historic" },
            { id: 9, name: "Rio de Janeiro", sky: 0x00ccff, fog: 0x66ddff, ground: 0x226622, buildBase: 0xffffff, hasPark: true, landmark: "Christ the Redeemer", type: "hills" }
        ];

        // --- 2. GAME STATE ---
        const Game = {
            active: false,
            city: null,
            weight: 350.0,
            minWeight: 160.0,
            maxWeight: 350.0,
            speed: 0,
            maxSpeedSlow: 5.0,  // Fat speed
            maxSpeedFast: 25.0, // Thin speed
            accel: 15.0,
            turnSpeed: 2.5,
            distance: 0,
            input: { up: false, down: false, left: false, right: false }
        };

        // --- 3. PRNG & UTILS ---
        class PRNG {
            constructor(seed) { this.seed = seed; }
            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
            range(min, max) { return min + this.next() * (max - min); }
            choice(arr) { return arr[Math.floor(this.next() * arr.length)]; }
        }

        // --- 4. ENGINE SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
        const clock = new THREE.Clock();

        let cityGroup, playerGroup, trafficGroup, pedestrianGroup;
        let torso, leftLeg, rightLeg, leftArm, rightArm; // Player parts
        let runTime = 0;
        let cars = [], pedestrians = [];
        
        // --- 5. UI BINDINGS ---
        const menu = document.getElementById('main-menu');
        const hud = document.getElementById('hud');
        const loader = document.getElementById('loader');
        const cityBtnContainer = document.getElementById('city-buttons');

        Cities.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'city-btn';
            btn.innerText = c.name;
            btn.onclick = () => initGame(c.id);
            cityBtnContainer.appendChild(btn);
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowUp' || e.code === 'KeyW') Game.input.up = true;
            if(e.code === 'ArrowDown' || e.code === 'KeyS') Game.input.down = true;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') Game.input.left = true;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') Game.input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowUp' || e.code === 'KeyW') Game.input.up = false;
            if(e.code === 'ArrowDown' || e.code === 'KeyS') Game.input.down = false;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') Game.input.left = false;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') Game.input.right = false;
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 6. INITIALIZATION SEQUENCE ---
        function initGame(cityId) {
            menu.style.display = 'none';
            loader.style.display = 'flex';
            
            setTimeout(() => {
                Game.city = Cities[cityId];
                Game.weight = 350.0;
                Game.distance = 0;
                Game.speed = 0;
                
                buildWorld();
                
                loader.style.display = 'none';
                hud.style.display = 'flex';
                document.getElementById('hud-city-name').innerText = Game.city.name;
                document.getElementById('hud-landmark').innerText = `Approaching ${Game.city.landmark}`;
                
                Game.active = true;
                animate();
            }, 100); // Allow UI to update
        }

        function buildWorld() {
            // Clear existing
            while(scene.children.length > 0){ scene.remove(scene.children[0]); }
            cars = []; pedestrians = [];

            // Environment
            scene.background = new THREE.Color(Game.city.sky);
            scene.fog = new THREE.FogExp2(Game.city.fog, 0.003);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, Game.city.neon ? 0.2 : 0.6);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffee, Game.city.neon ? 0.3 : 1.0);
            dirLight.position.set(100, 200, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 10;
            dirLight.shadow.camera.far = 500;
            dirLight.shadow.camera.left = -200;
            dirLight.shadow.camera.right = 200;
            dirLight.shadow.camera.top = 200;
            dirLight.shadow.camera.bottom = -200;
            scene.add(dirLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshStandardMaterial({ color: Game.city.ground, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Groups
            cityGroup = new THREE.Group(); scene.add(cityGroup);
            trafficGroup = new THREE.Group(); scene.add(trafficGroup);
            pedestrianGroup = new THREE.Group(); scene.add(pedestrianGroup);
            playerGroup = new THREE.Group(); scene.add(playerGroup);

            buildCityGenerator();
            buildPlayer();
            buildTraffic();
            buildPedestrians();
        }

        // --- 7. PROCEDURAL CITY GENERATOR ---
        function buildCityGenerator() {
            const rng = new PRNG(Game.city.id * 1337);
            const gridSize = 40; // Size of one city block
            const gridCount = 15; // 15x15 blocks
            const roadWidth = 12;
            
            // Materials
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 1.0 });
            const buildMats = [
                new THREE.MeshStandardMaterial({ color: Game.city.buildBase, roughness: 0.6 }),
                new THREE.MeshStandardMaterial({ color: adjustColor(Game.city.buildBase, 40), roughness: 0.6 }),
                new THREE.MeshStandardMaterial({ color: adjustColor(Game.city.buildBase, -40), roughness: 0.6 })
            ];
            if (Game.city.glass) buildMats.push(new THREE.MeshStandardMaterial({ color: 0xaaccff, metalness: 0.8, roughness: 0.2 }));
            if (Game.city.neon) buildMats.push(new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x0044ff, emissiveIntensity: 0.2 }));

            // Road Network Mesh (merged for perf)
            const roadsGeo = [];
            
            // Loop through grid to create blocks
            for(let x = -gridCount/2; x < gridCount/2; x++) {
                for(let z = -gridCount/2; z < gridCount/2; z++) {
                    const blockX = x * gridSize;
                    const blockZ = z * gridSize;
                    
                    // Road
                    const r = new THREE.PlaneGeometry(gridSize, roadWidth);
                    r.rotateX(-Math.PI/2);
                    r.translate(blockX, 0.05, blockZ + gridSize/2);
                    roadsGeo.push(r);

                    const r2 = new THREE.PlaneGeometry(roadWidth, gridSize);
                    r2.rotateX(-Math.PI/2);
                    r2.translate(blockX + gridSize/2, 0.05, blockZ);
                    roadsGeo.push(r2);

                    // Central Park / Landmark Reservation
                    if (x === 0 && z === 0) {
                        buildLandmark(blockX, blockZ);
                        continue; // Skip normal buildings
                    }
                    if (Game.city.hasPark && Math.abs(x) <= 1 && z === -2) {
                        buildPark(blockX, blockZ, gridSize - roadWidth);
                        continue;
                    }

                    // Sidewalk Base
                    const swSize = gridSize - roadWidth;
                    const sw = new THREE.Mesh(new THREE.BoxGeometry(swSize, 0.2, swSize), sidewalkMat);
                    sw.position.set(blockX, 0.1, blockZ);
                    sw.receiveShadow = true;
                    cityGroup.add(sw);

                    // Buildings on this block
                    const density = Game.city.type === 'dense' ? rng.range(2, 6) : rng.range(1, 4);
                    for(let b=0; b<density; b++) {
                        let w = rng.range(8, swSize/2);
                        let d = rng.range(8, swSize/2);
                        let h = rng.range(20, Game.city.type==='grid'? 150 : 80);
                        
                        // Core city is taller
                        const distFromCenter = Math.sqrt(x*x + z*z);
                        if(distFromCenter < 3) h *= rng.range(1.5, 3.0);

                        const bGeo = new THREE.BoxGeometry(w, h, d);
                        const bMesh = new THREE.Mesh(bGeo, rng.choice(buildMats));
                        
                        const px = blockX + rng.range(-swSize/2 + w/2, swSize/2 - w/2);
                        const pz = blockZ + rng.range(-swSize/2 + d/2, swSize/2 - d/2);
                        
                        bMesh.position.set(px, h/2, pz);
                        bMesh.castShadow = true;
                        bMesh.receiveShadow = true;
                        cityGroup.add(bMesh);

                        // Antennas / Roof details
                        if(h > 100 && rng.next() > 0.5) {
                            const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 20), new THREE.MeshStandardMaterial({color:0x333333}));
                            ant.position.set(px, h + 10, pz);
                            cityGroup.add(ant);
                        }
                    }
                }
            }

            // Merge Roads (using BufferGeometryUtils conceptually, but doing it manually via simple placement for compatibility without extra imports)
            // Actually, we'll just add them to group to avoid importing BufferGeometryUtils
            const finalRoadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
            roadsGeo.forEach(geo => {
                const mesh = new THREE.Mesh(geo, finalRoadMat);
                mesh.receiveShadow = true;
                cityGroup.add(mesh);
            });
        }

        // --- 8. PROCEDURAL LANDMARKS ---
        function buildLandmark(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);
            
            const matBase = new THREE.MeshStandardMaterial({color: 0x888888, metalness:0.3});
            const matDark = new THREE.MeshStandardMaterial({color: 0x333333});
            const matWhite = new THREE.MeshStandardMaterial({color: 0xeeeeee});
            const matRed = new THREE.MeshStandardMaterial({color: 0xcc2222});

            let mesh1, mesh2, mesh3;

            switch(Game.city.id) {
                case 0: // NY (Empire State abstract)
                    mesh1 = new THREE.Mesh(new THREE.BoxGeometry(30, 150, 30), matBase); mesh1.position.y = 75;
                    mesh2 = new THREE.Mesh(new THREE.BoxGeometry(20, 50, 20), matBase); mesh2.position.y = 175;
                    mesh3 = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 40), matBase); mesh3.position.y = 220;
                    group.add(mesh1, mesh2, mesh3); break;
                case 1: // Tokyo (Red Lattice abstract)
                    mesh1 = new THREE.Mesh(new THREE.CylinderGeometry(5, 30, 200, 4), matRed); mesh1.position.y = 100;
                    mesh2 = new THREE.Mesh(new THREE.CylinderGeometry(1, 5, 50, 4), matRed); mesh2.position.y = 225;
                    group.add(mesh1, mesh2); break;
                case 2: // London (Big Ben)
                    mesh1 = new THREE.Mesh(new THREE.BoxGeometry(15, 120, 15), matBase); mesh1.position.y = 60;
                    mesh2 = new THREE.Mesh(new THREE.BoxGeometry(16, 16, 16), matWhite); mesh2.position.y = 128; // Clock face
                    mesh3 = new THREE.Mesh(new THREE.ConeGeometry(12, 30, 4), matDark); mesh3.position.y = 150;
                    group.add(mesh1, mesh2, mesh3); break;
                case 3: // Paris (Eiffel abstract)
                    mesh1 = new THREE.Mesh(new THREE.CylinderGeometry(10, 40, 100, 4), matDark); mesh1.position.y = 50;
                    mesh2 = new THREE.Mesh(new THREE.CylinderGeometry(2, 10, 120, 4), matDark); mesh2.position.y = 160;
                    group.add(mesh1, mesh2); break;
                case 4: // SF (Transamerica)
                    mesh1 = new THREE.Mesh(new THREE.ConeGeometry(25, 200, 4), matWhite); mesh1.position.y = 100;
                    group.add(mesh1); break;
                case 5: // Dubai (Burj Khalifa)
                    mesh1 = new THREE.Mesh(new THREE.CylinderGeometry(8, 30, 250, 6), new THREE.MeshStandardMaterial({color:0xaaccff, metalness:0.8})); mesh1.position.y = 125;
                    mesh2 = new THREE.Mesh(new THREE.CylinderGeometry(1, 8, 100, 6), matBase); mesh2.position.y = 300;
                    group.add(mesh1, mesh2); break;
                case 6: // Chicago (Willis)
                    mesh1 = new THREE.Mesh(new THREE.BoxGeometry(25, 180, 25), matDark); mesh1.position.y = 90;
                    mesh2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 40), matWhite); mesh2.position.set(-8, 200, 0);
                    mesh3 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 40), matWhite); mesh3.position.set(8, 200, 0);
                    group.add(mesh1, mesh2, mesh3); break;
                case 7: // Sydney (Opera House abstract shells)
                    mesh1 = new THREE.Mesh(new THREE.SphereGeometry(20, 16, 16, 0, Math.PI), matWhite); mesh1.position.y = 0;
                    mesh2 = new THREE.Mesh(new THREE.SphereGeometry(15, 16, 16, 0, Math.PI), matWhite); mesh2.position.set(10,0,10);
                    group.add(mesh1, mesh2); break;
                case 8: // Rome (Colosseum)
                    mesh1 = new THREE.Mesh(new THREE.CylinderGeometry(40, 40, 30, 32, 1, true), new THREE.MeshStandardMaterial({color:0xddaa88, side:THREE.DoubleSide})); mesh1.position.y = 15;
                    group.add(mesh1); break;
                case 9: // Rio (Christ abstract)
                    mesh1 = new THREE.Mesh(new THREE.BoxGeometry(6, 40, 6), matWhite); mesh1.position.y = 20; // Body
                    mesh2 = new THREE.Mesh(new THREE.BoxGeometry(30, 6, 6), matWhite); mesh2.position.y = 30; // Arms
                    group.position.y = 50; // On hill
                    group.add(mesh1, mesh2); 
                    // Add hill
                    const hill = new THREE.Mesh(new THREE.SphereGeometry(30, 16, 16), new THREE.MeshStandardMaterial({color: 0x226622}));
                    hill.position.set(x, 0, z);
                    cityGroup.add(hill);
                    break;
            }
            
            group.children.forEach(c => { c.castShadow = true; c.receiveShadow = true; });
            cityGroup.add(group);
        }

        function buildPark(x, z, size) {
            const parkMat = new THREE.MeshStandardMaterial({ color: 0x2d4c1e });
            const p = new THREE.Mesh(new THREE.BoxGeometry(size, 0.3, size), parkMat);
            p.position.set(x, 0.15, z);
            p.receiveShadow = true;
            cityGroup.add(p);

            // Trees
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x1e5c2d });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3b22 });
            for(let i=0; i<15; i++) {
                const tx = x + (Math.random() - 0.5) * (size - 4);
                const tz = z + (Math.random() - 0.5) * (size - 4);
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), trunkMat);
                trunk.position.set(tx, 1.5, tz);
                trunk.castShadow = true;
                
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 6, 5), treeMat);
                leaves.position.set(tx, 4.5, tz);
                leaves.castShadow = true;
                
                cityGroup.add(trunk, leaves);
            }
        }

        function adjustColor(colorHex, amt) {
            let col = new THREE.Color(colorHex);
            col.r = Math.max(0, Math.min(1, col.r + amt/255));
            col.g = Math.max(0, Math.min(1, col.g + amt/255));
            col.b = Math.max(0, Math.min(1, col.b + amt/255));
            return col.getHex();
        }

        // --- 9. PLAYER AVATAR & PHYSICS ---
        function buildPlayer() {
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 });
            const shirtMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.8 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

            torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.8), shirtMat);
            torso.position.y = 1.8;
            torso.castShadow = true;
            playerGroup.add(torso);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skinMat);
            head.position.y = 2.8;
            head.castShadow = true;
            playerGroup.add(head);

            leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), pantsMat);
            leftLeg.position.set(-0.3, 0.6, 0);
            leftLeg.castShadow = true;
            playerGroup.add(leftLeg);

            rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), pantsMat);
            rightLeg.position.set(0.3, 0.6, 0);
            rightLeg.castShadow = true;
            playerGroup.add(rightLeg);

            leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), skinMat);
            leftArm.position.set(-0.8, 2.0, 0);
            leftArm.castShadow = true;
            playerGroup.add(leftArm);

            rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), skinMat);
            rightArm.position.set(0.8, 2.0, 0);
            rightArm.castShadow = true;
            playerGroup.add(rightArm);

            // Set starting position on a road
            playerGroup.position.set(0, 0, 20);
        }

        // --- 10. TRAFFIC & PEDESTRIAN SYSTEM ---
        function buildTraffic() {
            const carGeo = new THREE.BoxGeometry(2, 1.5, 4);
            const carMats = [
                new THREE.MeshStandardMaterial({color: 0xff0000}),
                new THREE.MeshStandardMaterial({color: 0x0000ff}),
                new THREE.MeshStandardMaterial({color: 0xffffff}),
                new THREE.MeshStandardMaterial({color: 0x333333}),
                new THREE.MeshStandardMaterial({color: 0xffff00}) // Taxi
            ];

            for(let i=0; i<40; i++) {
                const mesh = new THREE.Mesh(carGeo, carMats[Math.floor(Math.random()*carMats.length)]);
                
                // Align to road grid (Multiples of 40 for centers, offsets for lanes)
                const isVertical = Math.random() > 0.5;
                const gridSnap = Math.floor((Math.random() * 10) - 5) * 40;
                const randomAlong = (Math.random() * 400) - 200;
                const laneOffset = (Math.random() > 0.5 ? 1 : -1) * 3;

                if(isVertical) {
                    mesh.position.set(gridSnap + laneOffset, 0.75, randomAlong);
                    mesh.userData = { dir: new THREE.Vector3(0, 0, Math.sign(laneOffset)), speed: Math.random() * 10 + 15 };
                } else {
                    mesh.position.set(randomAlong, 0.75, gridSnap + laneOffset);
                    mesh.rotation.y = Math.PI / 2;
                    mesh.userData = { dir: new THREE.Vector3(Math.sign(laneOffset), 0, 0), speed: Math.random() * 10 + 15 };
                }
                
                mesh.castShadow = true;
                trafficGroup.add(mesh);
                cars.push(mesh);
            }
        }

        function buildPedestrians() {
            const pedGeo = new THREE.BoxGeometry(0.5, 1.8, 0.5);
            for(let i=0; i<50; i++) {
                const mat = new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff});
                const mesh = new THREE.Mesh(pedGeo, mat);
                
                // Spawn on sidewalks
                const gridSnap = Math.floor((Math.random() * 10) - 5) * 40;
                const randomAlong = (Math.random() * 400) - 200;
                const swOffset = (Math.random() > 0.5 ? 1 : -1) * 10; // Sidewalk edge

                if(Math.random() > 0.5) {
                    mesh.position.set(gridSnap + swOffset, 0.9, randomAlong);
                    mesh.userData = { dir: new THREE.Vector3(0, 0, Math.random() > 0.5 ? 1 : -1), speed: Math.random() * 2 + 1 };
                } else {
                    mesh.position.set(randomAlong, 0.9, gridSnap + swOffset);
                    mesh.userData = { dir: new THREE.Vector3(Math.random() > 0.5 ? 1 : -1, 0, 0), speed: Math.random() * 2 + 1 };
                }
                
                mesh.castShadow = true;
                pedestrianGroup.add(mesh);
                pedestrians.push(mesh);
            }
        }

        // --- 11. GAME LOOP & LOGIC ---
        function animate() {
            if(!Game.active) return;
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1);
            
            updatePlayerLogic(delta);
            updateCamera();
            updateCityLife(delta);
            updateUI();

            renderer.render(scene, camera);
        }

        function updatePlayerLogic(delta) {
            // Calculate capabilities based on weight
            const weightRatio = (Game.maxWeight - Game.weight) / (Game.maxWeight - Game.minWeight);
            const currentMaxSpeed = Game.maxSpeedSlow + (weightRatio * (Game.maxSpeedFast - Game.maxSpeedSlow));

            // Acceleration
            if (Game.input.up) {
                Game.speed += Game.accel * delta;
                if(Game.speed > currentMaxSpeed) Game.speed = currentMaxSpeed;
            } else if (Game.input.down) {
                Game.speed -= Game.accel * delta * 1.5; // Brake faster
                if(Game.speed < -currentMaxSpeed * 0.3) Game.speed = -currentMaxSpeed * 0.3;
            } else {
                // Friction
                if (Game.speed > 0) { Game.speed -= Game.accel * delta * 0.5; if(Game.speed < 0) Game.speed = 0; }
                if (Game.speed < 0) { Game.speed += Game.accel * delta * 0.5; if(Game.speed > 0) Game.speed = 0; }
            }

            // Steering
            if (Game.input.left) playerGroup.rotation.y += Game.turnSpeed * delta;
            if (Game.input.right) playerGroup.rotation.y -= Game.turnSpeed * delta;

            // Movement applied
            const moveAmt = Game.speed * delta;
            playerGroup.translateZ(moveAmt);
            
            // Absolute bounding box logic (City is ~ 600x600)
            const bounds = 300;
            if(playerGroup.position.x > bounds) playerGroup.position.x = -bounds;
            if(playerGroup.position.x < -bounds) playerGroup.position.x = bounds;
            if(playerGroup.position.z > bounds) playerGroup.position.z = -bounds;
            if(playerGroup.position.z < -bounds) playerGroup.position.z = bounds;

            // Fitness calculation
            if (Math.abs(moveAmt) > 0.05) {
                Game.distance += Math.abs(moveAmt) * 0.01; // Miles conversion roughly
                // Burn fat based on movement
                if (Game.weight > Game.minWeight) {
                    Game.weight -= (Math.abs(moveAmt) * 0.1); 
                    if(Game.weight < Game.minWeight) Game.weight = Game.minWeight;
                }
            }

            // --- VISUAL TRANSFORMATIONS ---
            // Torso width changes based on weight
            // 350lbs = 2.5 scale, 160lbs = 1.0 scale
            const bodyScale = 1.0 + (1.5 * (1 - weightRatio));
            torso.scale.set(bodyScale, 1, bodyScale);
            
            // Adjust arms outward to prevent clipping through fat
            leftArm.position.x = -0.4 - (0.4 * bodyScale);
            rightArm.position.x = 0.4 + (0.4 * bodyScale);

            // Procedural Running Animation
            if (Math.abs(Game.speed) > 0.1) {
                runTime += delta * Game.speed * 0.5;
                leftLeg.rotation.x = Math.sin(runTime) * 0.8;
                rightLeg.rotation.x = Math.sin(runTime + Math.PI) * 0.8;
                leftArm.rotation.x = Math.sin(runTime + Math.PI) * 0.8;
                rightArm.rotation.x = Math.sin(runTime) * 0.8;
                torso.position.y = 1.8 + Math.abs(Math.sin(runTime*2))*0.1; // Bobbing
            } else {
                leftLeg.rotation.x *= 0.8;
                rightLeg.rotation.x *= 0.8;
                leftArm.rotation.x *= 0.8;
                rightArm.rotation.x *= 0.8;
                torso.position.y = 1.8;
            }
        }

        function updateCamera() {
            // Chase camera mechanics
            const relativeCameraOffset = new THREE.Vector3(0, 4, -8);
            const cameraOffset = relativeCameraOffset.applyMatrix4(playerGroup.matrixWorld);
            
            camera.position.lerp(cameraOffset, 0.1);
            
            const lookAtPos = playerGroup.position.clone();
            lookAtPos.y += 2; // Look at head height
            camera.lookAt(lookAtPos);
        }

        function updateCityLife(delta) {
            // Cars
            cars.forEach(car => {
                car.position.addScaledVector(car.userData.dir, car.userData.speed * delta);
                if(car.position.x > 300) car.position.x = -300;
                if(car.position.x < -300) car.position.x = 300;
                if(car.position.z > 300) car.position.z = -300;
                if(car.position.z < -300) car.position.z = 300;
            });

            // Pedestrians (Simple bobbing and movement)
            pedestrians.forEach(ped => {
                ped.position.addScaledVector(ped.userData.dir, ped.userData.speed * delta);
                ped.position.y = 0.9 + Math.abs(Math.sin(Date.now()*0.01 + ped.position.x))*0.1;
                
                if(ped.position.x > 300) ped.position.x = -300;
                if(ped.position.x < -300) ped.position.x = 300;
                if(ped.position.z > 300) ped.position.z = -300;
                if(ped.position.z < -300) ped.position.z = 300;
            });
        }

        function updateUI() {
            document.getElementById('weight-val').innerText = Game.weight.toFixed(1);
            document.getElementById('speed-val').innerText = Math.abs(Game.speed).toFixed(1);
            document.getElementById('dist-val').innerText = Game.distance.toFixed(2);

            // Color coding weight
            const wVal = document.getElementById('weight-val');
            if(Game.weight > 300) wVal.style.color = 'var(--danger)';
            else if(Game.weight > 220) wVal.style.color = '#ffff00';
            else wVal.style.color = 'var(--accent)';

            // Progress bar
            const totalToLose = Game.maxWeight - Game.minWeight;
            const lost = Game.maxWeight - Game.weight;
            const pct = (lost / totalToLose) * 100;
            document.getElementById('fitness-bar').style.width = pct + '%';
        }

    </script>
</body>
</html>
